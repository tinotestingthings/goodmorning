<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Digest">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>SBX · Daily Digest</title>
<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
</head>
<body>

<main id="app">
  <section id="view-today" class="view">
    <div id="homeView" class="home-view"></div>
  </section>

  <section id="view-calendar" class="view" hidden>
    <div id="calendarView" class="calendar-view"></div>
  </section>

  <section id="view-settings" class="view" hidden>
    <div id="settingsView" class="settings-view"></div>
  </section>

  <section id="view-triage" class="view" hidden>
    <div class="mini-header">
      <button class="back-btn" id="triageBackBtn" aria-label="Back to Today" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div id="feedStatus" class="feed-status"></div>
    </div>
    <main id="deckArea"></main>
  </section>

  <section id="view-practice" class="view" hidden>
    <div class="practice-switcher">
      <button class="practice-tab" data-app="notesprint">NoteSprint</button>
      <button class="practice-tab" data-app="eartraining">ChordSprint</button>
      <a id="openInNewTab" class="practice-openlink" target="_blank" rel="noopener noreferrer">Open in new tab ↗</a>
    </div>
    <div class="practice-frame-wrap">
      <iframe id="practiceFrame" class="practice-frame" title="Practice app" allow="autoplay"></iframe>
    </div>
    <footer class="bottombar">
      <button id="continueBtn" class="btn btn-primary">Finish →</button>
    </footer>
  </section>
</main>

<nav class="tabbar" id="tabbar">
  <button class="tab-btn" data-route="today" aria-label="Today">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H9.5v-6h5v6h3a1 1 0 0 0 1-1v-9"/></svg>
    <span>Today</span>
  </button>
  <button class="tab-btn" data-route="calendar" aria-label="Calendar">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 2.5v4M16 2.5v4"/></svg>
    <span>Calendar</span>
  </button>
  <button class="tab-btn" data-route="triage" aria-label="Triage">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="7" width="14" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    <span>Triage</span>
    <span class="tab-badge hidden" id="triageBadge"></span>
  </button>
  <button class="tab-btn" data-route="practice" aria-label="Practice">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></svg>
    <span>Practice</span>
  </button>
  <button class="tab-btn" data-route="settings" aria-label="Settings">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span>Settings</span>
  </button>
</nav>

<script src="auth.js"></script>
<script src="loop.js"></script>
<script src="app.js"></script>
<script src="home.js"></script>
<script src="categories.js"></script>
<script src="calendar.js"></script>
<script src="reminders.js"></script>
<script src="settings.js"></script>
<script src="triage.js"></script>
<script src="practice.js"></script>
</body>
</html>
